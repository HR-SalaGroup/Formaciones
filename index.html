<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Registro de Formaciones</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #0f1117; }

    #loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f1117; color: #e8eaf6;
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 10; transition: opacity .4s ease;
    }
    #loader .emoji { font-size: 3rem; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    #loader p { font-size: .95rem; color: #8f95b2; margin-top: 12px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2e3452;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    iframe {
      width: 100%; height: 100vh;
      border: none; display: block;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="emoji">🎓</div>
    <div class="spinner"></div>
    <p>Cargando Sistema de Formaciones...</p>
  </div>

  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbxacDsvC0xDiGjz46HeviOTxvMs-As7T4jewfVHCDHaF6v473R4D8M_Xdkt8N787DiO/exec"
    allow="camera; microphone"
    onload="ocultarLoader()"
    onerror="mostrarError()">
  </iframe>

  <script>
    function ocultarLoader() {
      const loader = document.getElementById('loader');
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 400);
    }

    function mostrarError() {
      const loader = document.getElementById('loader');
      loader.innerHTML = `
        <div style="font-size:2.5rem;margin-bottom:16px;">⚠️</div>
        <p style="color:#ea4335;font-size:1rem;font-weight:600;">Error al cargar la aplicación</p>
        <p style="margin-top:8px;color:#8f95b2;font-size:.85rem;">Comprueba tu conexión e inténtalo de nuevo</p>
        <button onclick="location.reload()"
          style="margin-top:20px;padding:10px 24px;background:#1a73e8;color:#fff;
                 border:none;border-radius:8px;font-size:.95rem;cursor:pointer;">
          🔄 Reintentar
        </button>
      `;
      loader.style.opacity = '1';
    }

    // Timeout de seguridad: si tras 15s no carga, mostrar error
    setTimeout(() => {
      const loader = document.getElementById('loader');
      if (loader.style.display !== 'none') mostrarError();
    }, 15000);
  </script>

</body>
</html>
